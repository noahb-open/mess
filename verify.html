<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify Account</title>
  <style>
    body { background-color: #0d1b2a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #1b263b; padding: 30px; border-radius: 15px; text-align: center; width: 300px; }
    input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 5px; border: none; text-align: center; font-size: 20px; letter-spacing: 5px; }
    button { width: 96%; padding: 12px; border: none; border-radius: 5px; background-color: #38b000; color: white; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Enter Code 📩</h2>
    <p>Check your email for your Blue Rocket security token.</p>
    <form id="verifyForm">
      <input type="text" id="code" maxlength="6" placeholder="000000" required>
      <button type="submit">Verify & Launch</button>
    </form>
  </div>

  <script>
    document.getElementById('verifyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = document.getElementById('code').value;
      const email = localStorage.getItem('pendingEmail');

      const res = await fetch('/api/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, code })
      });

      const data = await res.json();
      if (data.success) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        window.location.href = '/chat.html';
      } else {
        alert(data.message || 'Incorrect Code');
      }
    });
  </script>
</body>
</html>
