<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Rocket - Sign Up</title>
  <style>
    body { background-color: #0d1b2a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #1b263b; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 300px; }
    .logo { font-size: 50px; color: #38b000; filter: drop-shadow(0 0 10px #00b4d8); }
    h2 { margin: 10px 0 20px; color: #e0e1dd; }
    input { width: 90%; padding: 10px; margin: 10px 0; border: none; border-radius: 5px; font-size: 16px; }
    button { width: 96%; padding: 12px; border: none; border-radius: 5px; background-color: #0077b6; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
    button:hover { background-color: #0096c7; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🚀</div>
    <h2>Blue Rocket</h2>
    <form id="signupForm">
      <input type="text" id="username" placeholder="Choose Username" required>
      <input type="email" id="email" placeholder="Your Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Sign Up</button>
    </form>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      localStorage.setItem('pendingEmail', email);

      const res = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });

      const data = await res.json();
      if (res.ok) {
        window.location.href = '/verify.html';
      } else {
        alert(data.error || 'Signup failed');
      }
    });
  </script>
</body>
</html>
