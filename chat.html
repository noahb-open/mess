<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blue Rocket - Messages</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background-color: #0d1b2a; color: white; }
    .sidebar { width: 30%; background: #1b263b; border-right: 2px solid #415a77; display: flex; flex-direction: column; }
    .sidebar-header { padding: 15px; border-bottom: 1px solid #415a77; display: flex; justify-content: space-between; align-items: center; }
    .friend-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
    .friend-item { padding: 12px; background: #415a77; margin-bottom: 8px; border-radius: 8px; cursor: pointer; }
    .chat-area { width: 70%; display: flex; flex-direction: column; background: #000814; }
    .chat-header { padding: 15px; background: #1b263b; font-size: 18px; font-weight: bold; }
    .messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 60%; padding: 10px; border-radius: 12px; font-size: 15px; }
    .msg.sent { background: #0077b6; align-self: flex-end; }
    .msg.received { background: #333; align-self: flex-start; }
    .input-area { padding: 15px; display: flex; gap: 10px; background: #1b263b; }
    .input-area input { flex-grow: 1; padding: 12px; border-radius: 20px; border: none; outline: none; }
    .input-area button { padding: 12px 20px; border-radius: 20px; border: none; background: #00b4d8; color: white; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header">
      <h3 id="myUsername">🚀 Rocket Chat</h3>
      <button onclick="addFriend()" style="background:#38b000; border:none; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">+ Add Friend</button>
    </div>
    <div class="friend-list" id="friendsContainer">
      <!-- Friends injected here -->
      <div class="friend-item" onclick="selectFriend('DemoFriend')">DemoFriend (Click to Chat)</div>
    </div>
  </div>

  <div class="chat-area">
    <div class="chat-header" id="activeChatPartner">Select a friend to message</div>
    <div class="messages" id="messageWindow"></div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Type a message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const socket = io();
    const myUser = localStorage.getItem('username');
    let activeReceiver = '';

    document.getElementById('myUsername').innerText = `🚀 ${myUser}`;
    socket.emit('join', myUser);

    function selectFriend(name) {
      activeReceiver = name;
      document.getElementById('activeChatPartner').innerText = `Chatting with: ${name}`;
      document.getElementById('messageWindow').innerHTML = ''; // Fresh chat look
    }

    function sendMessage() {
      const text = document.getElementById('messageInput').value;
      if(!text || !activeReceiver) return;

      // Render locally
      appendMessage(text, 'sent');
      
      // Dispatch over sockets
      socket.emit('private_message', { sender: myUser, receiver: activeReceiver, message: text });
      document.getElementById('messageInput').value = '';
    }

    socket.on('new_message', (data) => {
      if(data.sender === activeReceiver) {
        appendMessage(data.message, 'received');
      }
    });

    function appendMessage(text, type) {
      const win = document.getElementById('messageWindow');
      const div = document.createElement('div');
      div.classList.add('msg', type);
      div.innerText = text;
      win.appendChild(div);
      win.scrollTop = win.scrollHeight;
    }

    function addFriend() {
      const fName = prompt("Enter friend's exact username:");
      if(fName) {
        const container = document.getElementById('friendsContainer');
        const div = document.createElement('div');
        div.className = 'friend-item';
        div.innerText = fName;
        div.onclick = () => selectFriend(fName);
        container.appendChild(div);
      }
    }
  </script>
</body>
</html>
